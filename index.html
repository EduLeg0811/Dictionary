<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictio Pipeline</title>
  <style>
    :root {
      --bg: #f5efea; --bg-alt: #edf4f0; --panel: rgba(255,250,246,.9); --surface: #fff;
      --ink: #2f2925; --muted: #746b63; --line: #ddd0c5; --accent: #6b978f; --accent-strong: #567e77;
      --accent-soft: #e5f1ed; --powder: #edf3f8; --blush: #f7eef2; --sage: #eef5ef;
      --danger-soft: #f9ebed; --warn-soft: #faf1e3; --shadow: 0 18px 40px rgba(121,100,82,.1);
      --shadow-soft: 0 10px 24px rgba(121,100,82,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--ink); font: 15px/1.5 Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top left, rgba(255,248,242,.95), transparent 42%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 55%, #f8f4ef 100%);
      min-height: 100vh;
    }
    h1, h2, h3, p { margin: 0; }
    .shell { width: 100%; margin: 0; padding: 20px 20px 28px; }
    .hero, .panel {
      background: var(--panel); border: 1px solid rgba(221,208,197,.88); border-radius: 24px;
      box-shadow: var(--shadow); backdrop-filter: blur(10px);
    }
    .hero { padding: 28px; background: linear-gradient(180deg, #fdf7f2 0%, #eef4f7 100%); }
    .subtitle, .muted { color: var(--muted); }
    .subtitle { max-width: 760px; margin: 10px 0 24px; }
    .searchbar { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; }
    .action-stack { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; }
    input, button, .tag, .badge, .source-pill, .inline-btn {
      border: 1px solid var(--line); border-radius: 16px; font-size: 1rem;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .18s ease;
    }
    input {
      padding: 14px 16px; background: rgba(255,253,250,.96); color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
    }
    button {
      padding: 14px 16px; background: var(--accent-strong); color: #fff; font-weight: 700; cursor: pointer;
      box-shadow: 0 12px 24px rgba(86,126,119,.18);
    }
    #searchBtn {
      background: #dbe9e2;
      border-color: #bfd1c8;
      color: #324740;
      box-shadow: none;
    }
    #searchBtn:hover:not(:disabled) { transform: translateY(-1px); background: #d2e2da; }
    #analogBtn {
      background: #e6e4ef;
      border-color: #d2cedf;
      color: #3f4358;
      box-shadow: none;
    }
    #analogBtn:hover:not(:disabled) { transform: translateY(-1px); background: #dddbe8; }
    button.mode-active { border-color: rgba(86,126,119,.55); box-shadow: 0 0 0 4px rgba(107,151,143,.14); }
    button:disabled { opacity: .72; cursor: progress; box-shadow: none; }
    .action-meta { display: flex; justify-content: center; min-height: 24px; min-width: 24px; }
    .spinner {
      width: 24px; height: 24px; border-radius: 50%; border: 3px solid rgba(15,118,110,.18);
      border-top-color: var(--accent); animation: spin .85s linear infinite; opacity: 0; transition: opacity .18s ease;
    }
    .spinner.running { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      margin-top: 14px; min-height: 24px; display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px;
      border-radius: 14px; border: 1px solid rgba(221,208,197,.8); background: rgba(255,251,247,.66); color: var(--muted);
    }
    .status:empty { display: none; }
    .view { display: none; margin-top: 18px; }
    .view.visible { display: block; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; align-items: start; }
    .panel { padding: 22px; }
    .resultado-normalizado { background: linear-gradient(180deg, #f8fbfd 0%, var(--powder) 100%); }
    .pipeline-section { background: linear-gradient(180deg, #fff9fb 0%, var(--blush) 100%); }
    .analogico-panel { --analog-text-columns: 8; background: linear-gradient(180deg, #fbf9fd 0%, #eef5ef 100%); }
    .section-intro, .stack { display: grid; gap: 12px; }
    .card, .summary-card, .analog-accordion {
      border: 1px solid var(--line); border-radius: 20px; background: var(--surface); box-shadow: var(--shadow-soft);
    }
    .card { padding: 16px; }
    .card.ok { background: var(--accent-soft); }
    .card.fail { background: var(--danger-soft); }
    .card-head, .summary-term-row, .summary-section-head, .analog-class-head, .filter-strip {
      display: flex; justify-content: space-between; gap: 12px; align-items: baseline; flex-wrap: wrap;
    }
    .badge, .summary-lang, .filter-chip, .source-pill, .inline-btn, .tag {
      padding: 6px 10px; border-radius: 999px; background: rgba(255,253,250,.92);
    }
    .source-pill { cursor: pointer; }
    .source-pill.active { border-color: rgba(15,118,110,.5); box-shadow: inset 0 0 0 1px rgba(15,118,110,.18); }
    .source-pill.retry { background: var(--warn-soft); }
    .summary-card { padding: 22px; display: grid; gap: 18px; }
    .summary-hero { display: grid; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid rgba(216,204,186,.8); }
    .summary-kicker {
      font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700;
    }
    .summary-term { font-size: clamp(1.65rem, 2.6vw, 2.5rem); line-height: .95; letter-spacing: -.04em; }
    .summary-meta, .analog-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .summary-meta-card {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid rgba(107,151,143,.18); border-radius: 999px; padding: 6px 10px;
      background: rgba(248,251,250,.96);
    }
    .summary-meta-label { display: inline; color: var(--muted); font-size: .8rem; margin-bottom: 0; text-transform: none; }
    .summary-meta-value { font-size: .92rem; font-weight: 700; color: #30423f; }
    .py-2 { padding-top: 8px; }
    .column-controls { display: inline-flex; align-items: center; gap: 6px; }
    .column-control-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 80px; height: 80px; padding: 0;
      border: 1px solid rgba(107,151,143,.22);
      border-radius: 999px; background: rgba(255,253,250,.94); color: #42544f; box-shadow: none;
    }
    .column-control-btn svg { width: 40px; height: 40px; display: block; }
    .column-control-btn:hover:not(:disabled) { transform: translateY(-1px); background: #fff; }
    .column-control-btn:disabled { opacity: .45; cursor: default; }
    .column-control-readout { min-width: 42px; text-align: center; color: var(--muted); font-size: .82rem; }
    .etymology-box {
      border-left: 4px solid rgba(15,118,110,.35); padding: 12px 14px; border-radius: 0 14px 14px 0;
      background: rgba(229,241,237,.9);
    }
    .plain-text-block { color: var(--ink); line-height: 1.55; }
    .entry-section { padding-top: 8px; }
    .definition-list { margin: 0; padding-left: 22px; display: grid; gap: 12px; }
    .definition-main, .definition-note, .definition-example { display: block; }
    .definition-note, .analog-class-note, .analog-accordion-meta, .detail-line, .analog-source { color: var(--muted); }
    .definition-example { margin-top: 6px; padding-left: 12px; border-left: 2px solid rgba(15,118,110,.2); font-style: italic; }
    .tag-cloud, .source-strip { display: flex; flex-wrap: wrap; gap: 8px; }
    .analog-term-list {
      margin: 0;
      padding-left: 22px;
      display: grid;
      grid-template-columns: repeat(var(--analog-text-columns, 8), minmax(0, 1fr));
      column-gap: 22px;
      row-gap: 6px;
    }
    .analog-term-list li { color: var(--ink); line-height: 1.45; }
    .entry-meta-strip { display: flex; flex-wrap: wrap; gap: 8px; }
    .entry-meta-chip {
      padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(221,208,197,.82);
      background: rgba(255,253,250,.92); color: var(--muted); font-size: .9rem;
    }
    .entry-sense-list {
      margin: 0;
      padding-left: 22px;
      display: grid;
      grid-template-columns: 1fr;
      column-gap: 22px;
      gap: 10px;
    }
    .entry-sense-list li { line-height: 1.55; padding-left: 4px; }
    .analog-empty { padding: 18px; border: 1px dashed rgba(181,107,114,.32); border-radius: 18px; background: rgba(255,251,247,.86); color: var(--muted); }
    .analog-accordion summary {
      list-style: none; cursor: pointer; display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 16px 18px; background: linear-gradient(180deg, #fffdf9 0%, #f4f8f5 100%);
    }
    .analog-accordion summary::-webkit-details-marker { display: none; }
    .pipeline-accordion summary {
      list-style: none; cursor: pointer; display: grid; gap: 5px; padding: 12px 14px;
    }
    .pipeline-accordion summary::-webkit-details-marker { display: none; }
    .pipeline-summary-line { color: var(--muted); font-size: .92rem; line-height: 1.35; }
    .pipeline-card-body {
      display: grid; gap: 8px; padding: 10px 14px 14px; border-top: 1px solid rgba(221,208,197,.7);
    }
    .pipeline-card-body .definition-list { gap: 8px; }
    .pipeline-note { color: var(--muted); font-size: .9rem; line-height: 1.35; }
    .pipeline-error { line-height: 1.35; }
    .pipeline-card-body > p { margin: 0; }
    .pipeline-accordion[open] summary { padding-bottom: 10px; }
    .pipeline-accordion .card-head { margin: 0; }
    .pipeline-accordion .badge { align-self: start; }
    .pipeline-accordion .definition-list li { line-height: 1.5; }
    .pipeline-accordion .definition-main { line-height: 1.45; }
    body.academic-compact .pipeline-accordion summary { gap: 4px; padding: 10px 12px; }
    body.academic-compact .pipeline-summary-line { font-size: .84rem; }
    body.academic-compact .pipeline-card-body { gap: 6px; padding: 8px 12px 12px; }
    body.academic-compact .pipeline-card-body .definition-list { gap: 6px; }
    body.academic-compact .pipeline-note,
    body.academic-compact .pipeline-error { font-size: .82rem; }
    @media (max-width: 720px) {
      .pipeline-accordion .card-head { display: grid; }
    }
    .analog-accordion-title { display: grid; gap: 4px; }
    .analog-accordion-body { display: grid; gap: 14px; padding: 18px; border-top: 1px solid rgba(221,208,197,.7); }
    .analog-class { display: grid; gap: 10px; padding: 14px; border-radius: 16px; background: rgba(248,252,250,.9); border: 1px solid rgba(221,208,197,.72); }
    .json-accordion {
      border: 1px solid var(--line); border-radius: 12px; background: var(--surface); box-shadow: var(--shadow-soft);
    }
    .json-accordion summary {
      list-style: none; cursor: pointer; padding: 12px 14px; font-weight: 700;
    }
    .json-accordion summary::-webkit-details-marker { display: none; }
    .json-accordion pre {
      border: 0;
      border-top: 1px solid rgba(221,208,197,.7);
      border-radius: 0 0 12px 12px;
    }
    pre {
      margin: 0; white-space: pre-wrap; word-break: break-word; max-height: 420px; overflow: auto; padding: 16px;
      border: 1px solid var(--line); border-radius: 18px; background: rgba(255,252,249,.95); font-size: .8rem;
    }
    ul { margin: 10px 0 0 18px; padding: 0; }
    input:focus-visible, button:focus-visible, .source-pill:focus-visible,
    .inline-btn:focus-visible, .analog-accordion summary:focus-visible, .pipeline-accordion summary:focus-visible, .json-accordion summary:focus-visible {
      outline: none; border-color: rgba(107,151,143,.56); box-shadow: 0 0 0 4px rgba(107,151,143,.16);
    }

    body.academic-compact input,

    body.academic-compact .card,

<body class="academic-compact">
  <main class="shell">
    <section class="hero">
      <h1>Consulta Dicionários</h1>
      <div class="searchbar">
        <input id="term" placeholder="" value="" />
        <div class="action-stack">
          <button id="searchBtn" type="button">Definições</button>
          <button id="analogBtn" type="button">Ideias Afins</button>
          <div class="action-meta"><div id="spinner" class="spinner" aria-hidden="true"></div></div>
        </div>
      </div>
    </section>

    <section id="lexicoView" class="view">
      <section class="grid">
        <article class="panel stack resultado-normalizado">
          <div class="section-intro">
            <h2>Resultado normalizado</h2>
          </div>
          <div id="summary"></div>
          <details class="json-accordion">
            <summary>JSON</summary>
            <pre id="resultJson">{}</pre>
          </details>
        </article>

        <article class="panel stack pipeline-section">
          <div class="section-intro">
            <h2>Pipeline</h2>
          </div>
          <div id="pipelineFilter" class="filter-strip"></div>
          <div id="pipelineCards" class="stack"></div>
        </article>
      </section>

    </section>

    <section id="analogicoView" class="view">
      <article class="panel stack analogico-panel">
        <div class="section-intro">
          <h2>Ideias Afins</h2>
        </div>
        <div id="analogicoEntry"></div>
        <div id="analogicoSummary"></div>
        <div id="analogicoSenses" class="stack"></div>
      </article>
    </section>
  </main>

  <script>
    const isLocalDevelopmentHost = ["localhost", "127.0.0.1"].includes(window.location.hostname)
      || window.location.protocol === "file:";
    const API_BASE_URL = (window.DICTIO_API_BASE_URL || "").trim() || (
      isLocalDevelopmentHost ? "http://127.0.0.1:8000" : ""
    );

    /** @typedef {{label:string,group_count:number,term_count:number,groups:string[][],terms:string[]}} AnalogicoClassGroup */
    /** @typedef {{title:string,term_count:number,classes:AnalogicoClassGroup[]}} AnalogicoSense */
    /** @typedef {{index:number,text:string}} AnalogicoEntrySense */
    /** @typedef {{found:boolean,label:string,term:string,pronunciation:string,grammar:string,sense_count:number,definitions:AnalogicoEntrySense[],etymology:string|null}} AnalogicoEntry */
    /** @typedef {{input:{term:string,normalized_term:string,accentless_term:string},source:{name:string,url:string,cache_hit:boolean},entry:AnalogicoEntry,result:{term:string,found:boolean,sense_count:number,term_count:number,senses:AnalogicoSense[]},debug:{elapsed_ms:number,raw_keyword_count:number,empty_headings_dropped:number,message:string|null}}} AnalogicoPayload */

    const termInput = document.getElementById("term");
    const searchBtn = document.getElementById("searchBtn");
    const analogBtn = document.getElementById("analogBtn");
    const spinnerEl = document.getElementById("spinner");
    const statusEl = document.getElementById("status");
    const lexicoViewEl = document.getElementById("lexicoView");
    const analogicoViewEl = document.getElementById("analogicoView");
    const summaryEl = document.getElementById("summary");
    const resultJsonEl = document.getElementById("resultJson");
    const pipelineFilterEl = document.getElementById("pipelineFilter");
    const pipelineCardsEl = document.getElementById("pipelineCards");
    const analogicoPanelEl = document.querySelector(".analogico-panel");
    const analogicoEntryEl = document.getElementById("analogicoEntry");
    const analogicoSummaryEl = document.getElementById("analogicoSummary");
    const analogicoSensesEl = document.getElementById("analogicoSenses");

    let latestPipeline = [];
    let activeSourceFilter = null;
    let activeMode = null;
    let latestLexicalPayload = null;
    let latestLexicalTerm = "";
    let latestAnalogicalPayload = null;
    let latestAnalogicalTerm = "";
    const ANALOG_TEXT_COLUMNS_MIN = 1;
    const ANALOG_TEXT_COLUMNS_MAX = 10;
    const ANALOG_TEXT_COLUMNS_DEFAULT = 8;
    let analogTextColumns = ANALOG_TEXT_COLUMNS_DEFAULT;

    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }
    function setBusy(isBusy) {
      searchBtn.disabled = isBusy; analogBtn.disabled = isBusy; spinnerEl.classList.toggle("running", isBusy);
    }
    function setStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }
    function applyAnalogTextColumns() {
      analogicoPanelEl?.style.setProperty("--analog-text-columns", String(analogTextColumns));
    }
    function updateAnalogColumnControls() {
      const decreaseBtn = document.getElementById("decreaseColumnsBtn");
      const increaseBtn = document.getElementById("increaseColumnsBtn");
      const readout = analogicoSummaryEl.querySelector(".column-control-readout");
      if (decreaseBtn) decreaseBtn.disabled = analogTextColumns <= ANALOG_TEXT_COLUMNS_MIN;
      if (increaseBtn) increaseBtn.disabled = analogTextColumns >= ANALOG_TEXT_COLUMNS_MAX;
      if (readout) readout.textContent = `${analogTextColumns} col.`;
    }
    function bindAnalogColumnControls() {
      document.getElementById("decreaseColumnsBtn")?.addEventListener("click", () => adjustAnalogTextColumns(-1));
      document.getElementById("increaseColumnsBtn")?.addEventListener("click", () => adjustAnalogTextColumns(1));
    }
    function adjustAnalogTextColumns(delta) {
      const nextValue = Math.max(ANALOG_TEXT_COLUMNS_MIN, Math.min(ANALOG_TEXT_COLUMNS_MAX, analogTextColumns + delta));
      if (nextValue === analogTextColumns) return;
      analogTextColumns = nextValue;
      applyAnalogTextColumns();
      updateAnalogColumnControls();
    }
    function setActiveMode(mode) {
      activeMode = mode;
      searchBtn.classList.toggle("mode-active", mode === "lexico");
      analogBtn.classList.toggle("mode-active", mode === "analogico");
    }
    function setVisibleView(mode) {
      lexicoViewEl.classList.toggle("visible", mode === "lexico");
      analogicoViewEl.classList.toggle("visible", mode === "analogico");
    }
    function buildApiUrl(path) {
      return `${API_BASE_URL}${path}`;
    }
    function renderList(items) {
      return !items || !items.length ? "<p class='muted'>Sem itens.</p>" : `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }
    function renderTags(items) {
      return !items || !items.length ? "<p class='muted'>Sem itens consolidados.</p>" : `<div class="tag-cloud">${items.map(item => `<span class="tag">${escapeHtml(item)}</span>`).join("")}</div>`;
    }
    function renderBulletedTerms(items) {
      return !items || !items.length ? "<p class='muted'>Sem itens consolidados.</p>" : `<ul class="analog-term-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }
    function renderNumberedList(items, emptyMessage = "Sem itens consolidados.") {
      return !items || !items.length ? `<p class='muted'>${escapeHtml(emptyMessage)}</p>` : `<ol class="definition-list">${items.map(item => `<li><span class="definition-main">${escapeHtml(item)}</span></li>`).join("")}</ol>`;
    }
    function renderDefinitionCards(items) {
      if (!items || !items.length) return "<p class='muted'>Nenhuma definicao consolidada.</p>";
      return `<ol class="definition-list">${items.map(item => {
        const parts = String(item).split(/\bSinonim(?:o|os):\s*/i);
        const mainPart = parts[0].trim();
        const synonymPart = parts[1] ? parts[1].trim() : "";
        const examples = [...mainPart.matchAll(/[â€œ"]([^â€"]{6,220})[â€"]/g)].map(match => match[1]);
        const mainWithoutExamples = mainPart.replace(/[â€œ"]([^â€"]{6,220})[â€"]/g, "").replace(/\s{2,}/g, " ").trim();
        return `<li><span class="definition-main">${escapeHtml(mainWithoutExamples || mainPart)}</span>${synonymPart ? `<span class="definition-note">Sinonimos: ${escapeHtml(synonymPart)}</span>` : ""}${examples.map(example => `<span class="definition-example">${escapeHtml(example)}</span>`).join("")}</li>`;
      }).join("")}</ol>`;
    }
    function normalizeLookupText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }
    function scoreAnalogSenseMatch(title, term) {
      const normalizedTitle = normalizeLookupText(title);
      const normalizedTerm = normalizeLookupText(term);
      if (!normalizedTitle || !normalizedTerm) return 0;
      if (normalizedTitle === normalizedTerm) return 100;
      if (normalizedTitle.startsWith(normalizedTerm) || normalizedTerm.startsWith(normalizedTitle)) return 80;
      if (normalizedTitle.includes(normalizedTerm) || normalizedTerm.includes(normalizedTitle)) return 70;
      const titleTokens = normalizedTitle.split(" ").filter(Boolean);
      const termTokens = normalizedTerm.split(" ").filter(Boolean);
      const sharedTokens = titleTokens.filter(token => termTokens.includes(token));
      if (sharedTokens.length) return 40 + sharedTokens.length;
      return 0;
    }
    function prioritizeAnalogSenses(senses, term) {
      if (!Array.isArray(senses) || senses.length < 2) return senses || [];
      return senses
        .map((sense, index) => ({ sense, index, score: scoreAnalogSenseMatch(sense.title, term) }))
        .sort((left, right) => right.score - left.score || left.index - right.index)
        .map(item => item.sense);
    }

    function renderSummary(result, debug) {
      const sourcePills = debug.source_details.map(source => `
        <span class="source-pill ${source.accent_retry ? "retry" : ""} ${activeSourceFilter === source.source ? "active" : ""}" data-source-pill="${escapeHtml(source.source)}" role="button" tabindex="0">
          ${escapeHtml(source.source)} - ${source.definition_count} defs${source.accent_retry ? " - sem acento" : ""}
        </span>
      `).join("");

      summaryEl.innerHTML = `
        <div class="summary-card">
          <div class="summary-hero">
            <span class="summary-kicker">Entrada consolidada</span>
            <div class="summary-term-row">
              <h3 class="summary-term">${escapeHtml(result.term)}</h3>
              <span class="summary-lang">${escapeHtml(result.lang)}</span>
            </div>
            <div class="summary-meta">
              <div class="summary-meta-card"><span class="summary-meta-label">Fontes validas:</span><span class="summary-meta-value">${debug.sources_ok}/${debug.sources_total}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Definicoes:</span><span class="summary-meta-value">${result.summary.definitions.length}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Sinonimos:</span><span class="summary-meta-value">${result.summary.synonyms.length}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Latencia:</span><span class="summary-meta-value">${debug.elapsed_ms} ms</span></div>
            </div>
            <div class="source-strip">${sourcePills}</div>
          </div>
          <section class="section-intro">
            <div class="summary-section-head py-2"><h3>Etimologia</h3><span class="muted">${debug.accent_retry_count} retries sem acento</span></div>
            <div class="etymology-box">${escapeHtml(result.summary.etymology || "Etimologia nao encontrada nas fontes ativas.")}</div>
          </section>
          <section class="section-intro">
            <div class="summary-section-head py-2"><h3>Definicoes priorizadas</h3></div>
            ${renderDefinitionCards(result.summary.definitions)}
          </section>
          <section class="section-intro">
            <div class="summary-section-head py-2"><h3>Sinonimos consolidados</h3></div>
            ${renderNumberedList(result.summary.synonyms)}
          </section>
        </div>`;

      summaryEl.querySelectorAll("[data-source-pill]").forEach(node => {
        const source = node.getAttribute("data-source-pill");
        const activate = () => setSourceFilter(source === activeSourceFilter ? null : source);
        node.addEventListener("click", activate);
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); activate(); }
        });
      });
    }

    function setSourceFilter(source) {
      activeSourceFilter = source;
      if (latestLexicalPayload) {
        renderSummary(latestLexicalPayload.result, latestLexicalPayload.debug);
      }
      renderPipeline(latestPipeline);
      setStatus(source ? `Filtro ativo no pipeline: ${source}.` : "Filtro do pipeline limpo.");
    }

    function renderPipelineFilter() {
      if (!activeSourceFilter) {
        pipelineFilterEl.innerHTML = "<p class='muted'>Clique em uma fonte no resumo para filtrar o pipeline.</p>";
        return;
      }
      pipelineFilterEl.innerHTML = `<div class="filter-chip">Filtro ativo: <strong>${escapeHtml(activeSourceFilter)}</strong></div><button class="inline-btn" id="clearPipelineFilter" type="button">Limpar filtro</button>`;
      document.getElementById("clearPipelineFilter").addEventListener("click", () => setSourceFilter(null));
    }

    function renderPipeline(pipeline) {
      renderPipelineFilter();
      const visibleStages = activeSourceFilter ? pipeline.filter(stage => stage.source === activeSourceFilter) : pipeline;
      if (!visibleStages.length) {
        pipelineCardsEl.innerHTML = "<div class='card'><p class='muted'>Nenhuma etapa corresponde ao filtro atual.</p></div>";
        return;
      }
      pipelineCardsEl.innerHTML = visibleStages.map(stage => `
        <details class="card pipeline-accordion ${stage.ok ? "ok" : "fail"} ${stage.extra.retry_without_accents ? "retry" : ""}">
          <summary>
            <div class="card-head"><strong>${escapeHtml(stage.source)}</strong><span class="badge">${stage.ok ? "OK" : "FALHA"} - ${stage.elapsed_ms} ms</span></div>
            <p class="pipeline-summary-line">Definicoes: <strong>${stage.data.definition_count}</strong></p>
          </summary>
          <div class="pipeline-card-body">
            ${stage.error ? `<p class="pipeline-error"><strong>Erro:</strong> ${escapeHtml(stage.error)}</p>` : ""}
            ${stage.extra.first_attempt ? "<p class='pipeline-note'>Primeira tentativa falhou ou veio vazia; retry aplicado.</p>" : ""}
            ${renderNumberedList(stage.data.definitions, "Nenhuma definicao aproveitavel.")}
          </div>
        </details>`).join("");
    }

    function renderLexicoError(message) {
      summaryEl.innerHTML = `<div class="card fail"><p><strong>Falha:</strong> ${escapeHtml(message)}</p></div>`;
      pipelineFilterEl.innerHTML = "";
      pipelineCardsEl.innerHTML = "";
      resultJsonEl.textContent = "{}";
    }

    function renderAnalogicoEntry(entry) {
      if (!entry || !entry.found) {
        analogicoEntryEl.innerHTML = `
          <div class="card">
            <div class="section-intro">
              <div class="summary-section-head"><h3>Verbete Atualizado</h3></div>
              <p class="muted">Nao foi possivel extrair o verbete atualizado em formato organizado para esta consulta.</p>
            </div>
          </div>`;
        return;
      }

      const metaChips = [
        entry.pronunciation ? `<span class="entry-meta-chip">Pronuncia: ${escapeHtml(entry.pronunciation)}</span>` : "",
        entry.grammar ? `<span class="entry-meta-chip">Classe: ${escapeHtml(entry.grammar)}</span>` : "",
        `<span class="entry-meta-chip">${entry.sense_count} acepcoes</span>`,
      ].filter(Boolean).join("");

      analogicoEntryEl.innerHTML = `
        <div class="summary-card">
          <div class="summary-hero">
            <span class="summary-kicker">${escapeHtml(entry.label)}</span>
            <div class="summary-term-row">
              <h3 class="summary-term">${escapeHtml(entry.term)}</h3>
              <span class="summary-lang">Aulete</span>
            </div>
            <div class="entry-meta-strip">${metaChips}</div>
          </div>
          <section class="section-intro entry-section">
            <div class="summary-section-head"><h3>Definicao e acepcoes</h3></div>
            ${entry.definitions.length
              ? `<ol class="entry-sense-list">${entry.definitions.map(item => `<li value="${item.index}">${escapeHtml(item.text)}</li>`).join("")}</ol>`
              : "<p class='muted'>Nenhuma acepcao estruturada foi encontrada.</p>"}
          </section>
          ${entry.etymology ? `
            <section class="section-intro entry-section">
              <div class="summary-section-head"><h3>Etimologia</h3></div>
              <div class="plain-text-block">${escapeHtml(entry.etymology)}</div>
            </section>` : ""}
        </div>`;
    }

    function renderAnalogico(payload) {
      const result = payload.result;
      const debug = payload.debug;
      const orderedSenses = prioritizeAnalogSenses(result.senses, payload.input?.term || result.term);
      applyAnalogTextColumns();
      renderAnalogicoEntry(payload.entry);
      analogicoSummaryEl.innerHTML = `
        <div class="summary-card">
          <div class="summary-hero">
            <span class="summary-kicker">Mapa analogico</span>
            <div class="summary-term-row">
              <h3 class="summary-term">${escapeHtml(result.term)}</h3>
              <div class="column-controls" aria-label="Controle de colunas">
                <button class="column-control-btn" id="decreaseColumnsBtn" type="button" title="Diminuir colunas" ${analogTextColumns <= ANALOG_TEXT_COLUMNS_MIN ? "disabled" : ""}>
                  <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <rect x="1.5" y="2.5" width="4" height="11" rx="1"></rect>
                    <rect x="10.5" y="2.5" width="4" height="11" rx="1" opacity=".35"></rect>
                    <path d="M6.5 8h3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
                  </svg>
                </button>
                <span class="column-control-readout">${analogTextColumns} col.</span>
                <button class="column-control-btn" id="increaseColumnsBtn" type="button" title="Aumentar colunas" ${analogTextColumns >= ANALOG_TEXT_COLUMNS_MAX ? "disabled" : ""}>
                  <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <rect x="1.5" y="2.5" width="4" height="11" rx="1" opacity=".35"></rect>
                    <rect x="10.5" y="2.5" width="4" height="11" rx="1"></rect>
                    <path d="M6.5 8h3M8 6.5v3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="analog-meta">
              <div class="summary-meta-card"><span class="summary-meta-label">Acepcoes:</span><span class="summary-meta-value">${result.sense_count}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Termos afins:</span><span class="summary-meta-value">${result.term_count}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Blocos brutos:</span><span class="summary-meta-value">${debug.raw_keyword_count}</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Latencia:</span><span class="summary-meta-value">${debug.elapsed_ms} ms</span></div>
              <div class="summary-meta-card"><span class="summary-meta-label">Cabecalhos vazios removidos:</span><span class="summary-meta-value">${debug.empty_headings_dropped}</span></div>
            </div>
          </div>
        </div>`;
      bindAnalogColumnControls();
      updateAnalogColumnControls();

      if (!orderedSenses.length) {
        analogicoSensesEl.innerHTML = "<div class='analog-empty'>Nenhuma acepcao analoga foi encontrada para o termo consultado.</div>";
        return;
      }

      analogicoSensesEl.innerHTML = orderedSenses.map((sense, index) => `
        <details class="analog-accordion">
          <summary>
            <div class="analog-accordion-title">
              <strong>${escapeHtml(sense.title)}</strong>
              <span class="analog-accordion-meta">${sense.term_count} termos · ${sense.classes.length} classes</span>
            </div>
            <span class="badge">${sense.classes.length} secoes</span>
          </summary>
          <div class="analog-accordion-body">
            ${sense.classes.map(group => `
              <section class="analog-class">
                <div class="analog-class-head"><h3>${escapeHtml(group.label)}</h3><span class="analog-class-note">${group.term_count} termos · ${group.group_count} grupos</span></div>
                ${renderBulletedTerms(group.terms)}
              </section>`).join("")}
          </div>
        </details>`).join("");
    }

    async function fetchLexicon() {
      const term = termInput.value.trim();
      if (!term) { setStatus("Informe uma palavra para consultar."); return; }
      setActiveMode("lexico");
      if (latestLexicalPayload && latestLexicalTerm === term) {
        renderSummary(latestLexicalPayload.result, latestLexicalPayload.debug);
        renderPipeline(latestPipeline);
        resultJsonEl.textContent = JSON.stringify(latestLexicalPayload.result, null, 2);
        setVisibleView("lexico");
        setStatus(`Resultado lexical em cache reaproveitado para "${term}".`);
        return;
      }
      setVisibleView(null);
      setBusy(true);
      setStatus(`Consultando "${term}" nas fontes configuradas...`);
      try {
        const response = await fetch(buildApiUrl(`/lexico?palavra=${encodeURIComponent(term)}`));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        latestLexicalPayload = payload;
        latestLexicalTerm = term;
        latestPipeline = payload.pipeline;
        activeSourceFilter = null;
        renderSummary(payload.result, payload.debug);
        renderPipeline(latestPipeline);
        resultJsonEl.textContent = JSON.stringify(payload.result, null, 2);
        setVisibleView("lexico");
        setStatus(`Consulta concluida para "${term}".`);
      } catch (error) {
        renderLexicoError(error.message);
        setVisibleView("lexico");
        setStatus(`Nao foi possivel concluir a consulta de "${term}".`);
      } finally {
        setBusy(false);
      }
    }

    async function fetchAnalogico() {
      const term = termInput.value.trim();
      if (!term) { setStatus("Informe uma palavra para consultar."); return; }
      setActiveMode("analogico");
      if (latestAnalogicalPayload && latestAnalogicalTerm === term) {
        renderAnalogico(latestAnalogicalPayload);
        setVisibleView("analogico");
        setStatus(`Resultado analogico em cache reaproveitado para "${term}".`);
        return;
      }
      setVisibleView(null);
      setBusy(true);
      setStatus(`Buscando ideias afins para "${term}" no Aulete...`);
      try {
        const response = await fetch(buildApiUrl(`/analogico?palavra=${encodeURIComponent(term)}`));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        /** @type {AnalogicoPayload} */
        const payload = await response.json();
        latestAnalogicalPayload = payload;
        latestAnalogicalTerm = term;
        renderAnalogico(payload);
        setVisibleView("analogico");
        setStatus(payload.result.found ? `Ideias afins carregadas para "${term}".` : (payload.debug.message || `Nenhuma relacao de ideias afins foi encontrada para "${term}".`));
      } catch (error) {
        analogicoEntryEl.innerHTML = "";
        analogicoSummaryEl.innerHTML = `<div class="card fail"><p><strong>Falha:</strong> ${escapeHtml(error.message)}</p></div>`;
        analogicoSensesEl.innerHTML = "<div class='analog-empty'>Nao foi possivel consolidar as ideias afins para o termo atual.</div>";
        setVisibleView("analogico");
        setStatus(`Falha ao buscar ideias afins para "${term}".`);
      } finally {
        setBusy(false);
      }
    }

    searchBtn.addEventListener("click", fetchLexicon);
    analogBtn.addEventListener("click", fetchAnalogico);
    termInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        if (activeMode === "analogico") fetchAnalogico();
        else fetchLexicon();
      }
    });
    applyAnalogTextColumns();
  </script>
</body>
</html>
